  #intro .phrase.show{opacity:1;transform:none}
  #intro .phrase em{font-style:normal;color:var(--verde)}

  *,*::before,*::after{box-sizing:border-box}
  html,body{overflow-x:hidden;max-width:100%}
  img{max-width:100%}
  @media (max-width:900px){
    /* impede que blocos de texto (align-items center/flex-start + maxWidth em ch) estourem a tela */
    [data-screen-label] *{max-width:100%!important}

  @media (max-width:680px){
    .ndg-2{grid-template-columns:1fr!important}

  }
  @media (max-width:560px){

  }
</style>

<div id="intro"><div class="phrase" id="introPhrase"></div></div>

<script>
(function () {
  var phrases = [
    "<em>96%</em> dos donos de PME conhecem o ChatGPT.",
    "Só <em>22%</em> têm IA trabalhando de verdade.",
    "O funcionário que você <em>não precisa contratar</em>."
  ];
  var el = document.getElementById("introPhrase");
  var intro = document.getElementById("intro");
  var i = 0;
  function next() {
    if (i >= phrases.length) {
      var finish = function () {
        intro.classList.add("done");
        setTimeout(function () { intro.remove(); }, 700);
      };
      if (window.__siteReady) finish();
      else { window.__onSiteReady = finish; setTimeout(finish, 4000); }
      return;
    }
    el.innerHTML = phrases[i];
    el.classList.add("show");
    setTimeout(function () {
      el.classList.remove("show");
      setTimeout(function () { i++; next(); }, 450);
    }, 1900);
  }
  next();
})();
</script>

        <div style={{ display: "flex", flexDirection: "column", gap: 10, maxWidth: 800 }}>
          {qs.map((item, i) => (
            <div key={item.q} onClick={() => setOpen(open === i ? null : i)} style={{ background: "var(--ink-2)", border: "1px solid var(--ink-border)", borderRadius: "var(--radius-md)", padding: "16px 20px", cursor: "pointer", display: "flex", flexDirection: "column", gap: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", gap: 16, alignItems: "center" }}>
                <span style={{ font: "var(--type-body)", fontWeight: 500 }}>{item.q}</span>
                <span style={{ color: "var(--verde)", fontFamily: "var(--font-mono)" }}>{open === i ? "−" : "+"}</span>
              </div>
              {open === i && <p style={{ font: "var(--type-small)", color: "var(--text-on-dark-muted)", margin: 0 }}>{item.a}</p>}
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

      <div style={{ ...wrap, textAlign: "center", display: "flex", flexDirection: "column", gap: 24, alignItems: "center" }}>

        <p style={{ font: "var(--type-body-lg)", color: "var(--text-on-dark-muted)", margin: 0, maxWidth: "56ch" }}>Me chama no WhatsApp e me diz o que mais come o seu dia. Eu te digo na hora se dá pra resolver — e qual seria o primeiro fluxo.</p>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", justifyContent: "center" }}>
          <Button variant="primary" size="lg">Fazer o diagnóstico gratuito</Button>
          <Button variant="secondary" size="lg">Falar por e-mail</Button>
        </div>
      </div>
    </section>
  );
}

function Footer() {

    <footer data-screen-label="Footer" style={{ borderTop: "1px solid var(--ink-border)", padding: "var(--space-6) 0" }}>
      <div style={{ ...wrap, display: "flex", gap: 32, alignItems: "center", justifyContent: "space-between", flexWrap: "wrap" }}>
        <Wordmark />
        <span style={{ font: "var(--type-caption)", color: "var(--text-on-dark-muted)" }}>© 2026 Nidus · contato@nidusventures.com.br</span>
        <nav style={{ display: "flex", gap: 24, font: "var(--type-small)", color: "var(--text-on-dark-muted)" }}>
          <a href="#" style={{ color: "inherit" }}>WhatsApp</a>
          <a href="#" style={{ color: "inherit" }}>LinkedIn</a>
          <a href="#" style={{ color: "inherit" }}>Instagram</a>
        </nav>
      </div>
    </footer>
  );
}

function Page() {
  return (
    <div>
      <Nav />
      <Hero />
      <Comparison />

ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
window.__siteReady = true;
if (window.__onSiteReady) window.__onSiteReady();
});
